<!DOCTYPE html>
<html lang="en">
  <head>
    <style>
      .container {
        width: 800px;
        margin: 50px;
        padding: 20px;
        background-color: black;
        color: white;
        border-radius: 10px;
      }
    </style>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>
  </head>
  <body>
    <div id="root"></div>

    <script type="text/babel">
      function MySection(props) {
        // para = {title:"html",desc:"----"}
        return (
          <div className="container">
            <h1>{props.title}</h1>
            <p>{props.desc}</p>
          </div>
        );
      }

      function App() {
        return (
          <div>
            <MySection title={"HTML"} desc={"HTML is a Markup Language"} />

            <MySection title={"React JS"} desc={"React JS is a Library"} />
            <MySection
              title={"React Native"}
              desc={"React Native is a Framework"}
            />
          </div>
        );
      }

      ReactDOM.render(<App />, document.getElementById("root"));
    </script>
  </body>
</html>
